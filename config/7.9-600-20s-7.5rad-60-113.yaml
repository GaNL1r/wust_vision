common:
  detect_color: 0
  init_attack_mode: 0
  max_infer_running: 7
  only_nav_enable: false
  use_armor_detect_ncnn: false
  use_armor_detect_opencv: false
  use_rune_detect_ncnn: false
  use_auto_labeler: false
  use_calculation: false
  max_detect_armors: 10

camera:
  acquisition_frame_rate: 140
  adc_bit_depth: Bits_8
  camera_info_path: /home/hy/wust_vision/config/camera_info.yaml
  exposure_time: 2000
  gain: 16
  pixel_format: BayerRG8
  acquisitionFrameRateEnable: true
  recorder: false
  video_player:
    fps: 90
    loop: true
    path: /home/hy/6.11/output.mp4
    start_frame: 500
    use: false

control:
  alpha_pitch: 0.7
  alpha_yaw: 0.5
  control_rate: 2000
  communication_delay: 1
  device_name: /dev/ttyACM0
  max_pitch_change: 5
  max_yaw_change: 10
  use_nav: false
  use_serial: true
  control_filter:
    poly_order: 3
    future_window: 10
    base_alpha: 0.4
    base_k_ff: 0.7
    jump_threshold: 1
    use: false

tf:
  gimbal2camera_pitch: 0
  gimbal2camera_roll: 0
  gimbal2camera_x: 0.07
  gimbal2camera_y: 0.05
  gimbal2camera_yaw: 0.5
  gimbal2camera_z: 0.0

debug:
  debug_mode: true
  debug_h: 1080
  debug_w: 1440
  debug_show_dt: 0.01
  debug_fps: 60

logger:
  log_level: INFO
  log_path: /home/hy/wust_log
  use_logcli: true
  use_logfile: true
  use_simplelog: true

armor_solver:
  bullet_speed: 21
  compenstator_type: ideal
  controller_delay: 0.01
  gravity: 9.8
  iteration_times: 20
  max_tracking_v_yaw: 180
  prediction_delay: 0.0
  resistance: 0.092
  shooting_range_h: 0.15
  shooting_range_w: 0.15
  side_angle: 20
  trajectory_offset:
    - d_max: 4
      d_min: 0
      h_max: 0.4
      h_min: -1
      pitch_off: -1.2
      yaw_off: 0
    - d_max: 6
      d_min: 4
      h_max: 0.4
      h_min: -1
      pitch_off: -0.5
      yaw_off: 0

armor_tracker:
  ekf:
    iteration_num: 2
    oyr_d: 0.0005 #1m处
    oyr_p: 1 #角度
    oyr_y: 1 #角度
    oyr_yaw: 3 #角度
    oys2qx: 10
    oys2qy: 10
    oys2qyaw: 20
    oys2qz: 1
    yr_d: 0.005 #1m处
    yr_p: 7 #角度
    yr_y: 7 #角度
    yr_yaw: 6 #角度
    ys2qd_zc: 500
    ys2qr: 70
    ys2qx: 10
    ys2qy: 10
    ys2qyaw: 20
    ys2qz: 3.0
  jump_thresh: 0.4
  lost_time_thres: 0.5
  max_match_distance: 0.5
  max_match_yaw_diff: 0.5
  max_match_z_diff: 0.2
  one_lost_time_thres: 0.1
  tracking_thres: 5
  use_ypd_tracker: true
  v_yaw_to_one_thres: 1.0
  v_yaw_update_thres: 1.5

rune_solver:
  auto_type_determined: true
  bullet_speet: 20
  compensator_type: resistance
  ekf:
    use_ypd: true
    iteration_num: 1
    q_xyzyaw:
      - 2e-4
      - 1e-4
      - 1e-4
      - 1e-4
    r_xyzyaw:
      - 4e-2
      - 1e-2
      - 1e-2
      - 1e-2
    q_ypdyaw:
      - 2e-4
      - 1e-4
      - 1e-4
      - 1e-4
    r_ypdyaw:
      - 1e-4
      - 1e-4
      - 5e-2
      - 1e-2
  gravity: 9.8
  lost_time_thres: 0.5
  predict_offset: 0.1
  trajectory_offset:
    - d_max: 6
      d_min: 5
      h_max: 0.4
      h_min: -1
      pitch_off: 0.1
      yaw_off: 0
