# --- SMC 增益 ---
lambda:
  1.2
  # 含义：滑模面角度误差权重 λ
  # 作用：s = (速度误差) + λ * (角度误差)
  # 大 λ → 收敛快，可能超调；小 λ → 收敛慢，控制平滑
  # 建议范围：
  #   小型舵机/电机：1~5
  #   高惯量负载：0.5~2
  # 调参：先把 k, phi 固定，逐步调 λ，观察角度收敛速度和超调情况

k:
  2.0
  # 含义：到达律增益 K
  # 作用：控制滑模面到达速度，u = - B^-1 * K * sat(s/phi)
  # 大 k → 到达快，但可能抖振；小 k → 到达慢，响应平滑
  # 建议范围：
  #   小型系统：3~10
  #   大惯量系统：5~20
  # 调参：先固定 λ, phi，逐步增加 k 直到滑模面快速收敛而不抖振

phi:
  2.0
  # 含义：连续逼近函数边界 φ
  # 作用：sat(s/phi) 平滑过渡，防止抖振
  # 大 phi → 控制平滑，收敛稍慢；小 phi → 控制接近理想 SMC，可能抖振
  # 建议范围：误差量的 5%~10% 或 0.2~1 度（角度单位）
  # 调参：观察系统抖振情况，必要时增大 phi 以平滑控制
# 单位说明：
#  - setpoint / measurement: 度 (°)
#  - 控制输出 (torque): Nm
alpha: 0.05