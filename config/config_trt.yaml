only_nav_enable: false
use_auto_labeler: false
init_attack_mode: 0
detect_color: 1
max_infer_running: 7
armor_detect:
  light:
    binary_thres: 85
    expand_ratio_h: 1.1
    expand_ratio_w: 1.1
    max_angle: 40
    max_ratio: 0.45
    min_ratio: 0.05
  armor:
    min_light_ratio: 0.8
    min_small_center_distance: 0.8
    max_small_center_distance: 3.5
    min_large_center_distance: 3.5
    max_large_center_distance: 8.0
    max_angle: 35.0
  classify_label_path: /home/hy/wust_vision/model/label.txt
  classify_model_path: /home/hy/wust_vision/model/mlp.onnx
  model:
    conf_threshold: 0.25
    input_h: 416
    input_w: 416
    nms_threshold: 0.3
    num_classes: 8
    num_colors: 4
    top_k: 128
    model_path: /home/hy/wust_vision/model/opt-1208-001.onnx
camera:
  acquisition_frame_rate: 200
  adc_bit_depth: Bits_8
  camera_info_path: /home/hy/wust_vision/config/camera_info.yaml
  exposure_time: 1500
  gain: 16
  pixel_format: BayerRG8
  recorder: false
  video_player:
    use: false
    path: /home/hy/6.11/output.mp4
    loop: true
    fps : 90
    start_frame: 0

control:
  alpha_pitch: 0.9
  alpha_yaw: 0.9
  control_rate: 1000
  device_name: /dev/ttyACM0
  max_pitch_change: 5
  max_yaw_change: 10
  use_serial: false
  use_nav:  false
debug:
  debug_h: 1080
  debug_mode: true
  debug_show_dt: 0.01
  debug_w: 1440

logger:
  log_level: DEBUG
  log_path: /home/hy/wust_log
  use_logcli: true
  use_logfile: true
  use_simplelog: true

armor_solver:
  bullet_speed: 25
  compenstator_type: ideal
  controller_delay: 0
  gravity: 9.8
  iteration_times: 20
  max_tracking_v_yaw: 180
  trajectory_offset:
  - d_max: 6
    d_min: 5
    h_max: 0.4
    h_min: -1
    pitch_off: 0.1
    yaw_off: 0
  
  prediction_delay: 0.05
  resistance: 0.092
  shooting_range_h: 0.12
  shooting_range_w: 0.12
  side_angle: 20
tf:
  gimbal2camera_pitch: 0
  gimbal2camera_roll: 0
  gimbal2camera_x: 0.07
  gimbal2camera_y: 0
  gimbal2camera_yaw: 0
  gimbal2camera_z: -0.05
  odom2gimbal_pitch: 0
  odom2gimbal_roll: 0
  odom2gimbal_yaw: 0
armor_tracker:
  use_ypd_tracker: true
