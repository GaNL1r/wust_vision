rune_detector:
  detect_r_tag: true
  min_lightness: 90
  model: "/home/hy/wust_vision/model/yolox_rune_3.6m.onnx"
  confidence_threshold: 0.5
  top_k: 128
  nms_threshold: 0.3
rune_solver:
  auto_type_determined: true 
  predict_time: 0.0
  compensator_type: resistance
  gravity: 9.8
  bullet_speet: 28.0
  lost_time_thres: 0.5
  predict_offset: 0.1
  trajectory_offset:
  - d_max: 6
    d_min: 5
    h_max: 0.4
    h_min: -1
    pitch_off: 0.1
    yaw_off: 0
  ekf:
    q: [4e-4, 1e-4, 1e-4, 1e-4]
    r: [4e-2, 1e-2, 1e-2, 1e-2]
