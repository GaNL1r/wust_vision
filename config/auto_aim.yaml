armor_detect_backend: tensorrt
max_detect_armors: 11
use_ba: true

armor_optimize:
  max_iter_R: 3000
  max_iter_t: 1000
  step_R: 300
  step_t: 100
  min_error_R: 0.7
  min_error_t: 0.5
  distance_fix_a2: 0.00

armor_tracker:
  ekf:
    use_esekf: false
    fusion_esekf_ekf: true
    iteration_num: 2

    oyr_d_front: 0.09 #1m处
    oyr_d_side: 0.09 #1m处
    oyr_p: 3 #角度
    oyr_y: 3 #角度
    oyr_yaw_front: 3
    oyr_yaw_side: 3

    oys2qx: 40
    oys2qy: 40
    oys2qyaw: 30
    oys2qz: 5
    #----------------
    yr_d_front_a: 0.03 #1m处
    yr_d_side_a: 0.05 #1m处
    yr_p_a: 5 #角度
    yr_y_a: 5 #角度
    yr_yaw_front_a: 10
    yr_yaw_side_a: 4

    ys2qd_zc_a: 900
    ys2qr_a: 70
    ys2qx_a: 15
    ys2qy_a: 15
    ys2qyaw_a: 30
    ys2qz_a: 3.0
    #----------------
    yr_d_front_c: 0.07 #1m处
    yr_d_side_c: 0.05 #1m处
    yr_p_c: 6 #角度
    yr_y_c: 6 #角度
    yr_yaw_front_c: 4
    yr_yaw_side_c: 4

    ys2qd_zc_c: 700
    ys2qr_c: 70
    ys2qx_c: 22
    ys2qy_c: 22
    ys2qyaw_c: 35
    ys2qz_c: 1.0
    #----------------
    r_v: 100.0
    q_v: 5.0
    q_a: 1.0
  jump_thresh: 0.4
  lost_time_thres: 0.9
  max_match_distance: 0.5
  max_match_yaw_diff: 0.5
  max_match_z_diff: 0.1
  one_lost_time_thres: 0.1
  tracking_thres: 5
  one_tracking_thres: 1
  track_one_num: 2

auto_aim_fsm:
  thres_up_1: 1.5
  thres_down_1: 0.5
  thres_up_2: 7.0
  thres_down_2: 6.0

aimer:
  compenstator_type: ideal
  gravity: 9.8
  iteration_times: 20
  prediction_delay: 0.0
  comming_angle: 60
  leaving_angle: 20

shooter:
  small_shooting_range_h: 0.12
  small_shooting_range_w: 0.09
  big_shooting_range_h: 0.2
  big_shooting_range_w: 0.15
  trajectory_offset:
    - d_max: 4
      d_min: 0
      h_max: 0.4
      h_min: -1
      pitch_off: -1.5
      yaw_off: 0
    - d_max: 7
      d_min: 4
      h_max: 0.4
      h_min: -1
      pitch_off: -1.3
      yaw_off: 0
