armor_detect:
  armor:
    max_angle: 40
    max_large_center_distance: 8
    max_small_center_distance: 3.5
    min_large_center_distance: 3.5
    min_light_ratio: 0.5
    min_small_center_distance: 0.05
  classify:
    label_path: ${VISION_ROOT}/model/label.txt
    model_path: ${VISION_ROOT}/model/reborn_number_classifier.onnx
    threshold: 0.5
  light:
    binary_thres: 80
    expand_ratio_h: 1.2
    expand_ratio_w: 1.2
    max_angle: 45
    max_ratio: 0.6
    min_ratio: 0.01
    max_pts_error: 20.0
    max_angle_diff: 20.0
    color_diff_thresh: 20
  model:
    conf_threshold: 0.2
    model_path: ${VISION_ROOT}/model/opt-1208-001.onnx
    device_id: 0
    nms_threshold: 0.3
    top_k: 128
    max_infer_running: 4
    min_free_mem_ratio: 0.1
    use_cuda_pre: true
    use_cuda_post: false
    log_time: false
    model_type: tup
