armor_detect:
  armor:
    max_angle: 30
    max_large_center_distance: 8
    max_small_center_distance: 3.5
    min_large_center_distance: 3.5
    min_light_ratio: 0.5
    min_small_center_distance: 0.05
  classify:
    label_path: /home/hy/wust_vision/model/label.txt
    model_path: /home/hy/wust_vision/model/mlp.onnx
    threshold: 0.5
  light:
    binary_thres: 105
    expand_ratio_h: 1.2
    expand_ratio_w: 1.2
    max_angle: 45
    max_ratio: 0.6
    min_ratio: 0.01
  model:
    conf_threshold: 0.2
    model_path: /home/hy/wust_vision/model/opt-1208-001.onnx
    device_id: 0
    nms_threshold: 0.3
    top_k: 128
    max_infer_running: 4
    min_free_mem_ratio: 0.1
    use_cuda_pre: false
    use_cuda_post: false
    log_time: false
    model_type: tup

rune_detector:
  confidence_threshold: 0.5
  detect_r_tag: false
  use_manual_r: true
  min_lightness: 80
  model: /home/hy/wust_vision/model/yolox_rune_3.6m.onnx
  device_id: 0
  nms_threshold: 0.3
  top_k: 128
  max_infer_running: 4
  min_free_mem_ratio: 0.3
  use_cuda_pre: false
  use_cuda_post: false
  log_time: false
  model_type: tup
