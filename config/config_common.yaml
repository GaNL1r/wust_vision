common:
  detect_color: 1
  init_attack_mode: 0
  max_infer_running: 7
  only_nav_enable: false
  use_armor_detect_ncnn: false
  use_armor_detect_opencv: false
  use_rune_detect_ncnn: false
  use_auto_labeler: false
  use_calculation: false
  max_detect_armors: 10
  use_omni: true

camera:
  target_sn: DA1094119
  acquisition_frame_rate: 140
  adc_bit_depth: Bits_8
  camera_info_path: /home/hy/wust_vision/config/camera_info.yaml
  exposure_time: 1000
  gain: 16
  pixel_format: BayerRG8
  acquisitionFrameRateEnable: true
  recorder: false
  video_player:
    fps: 90
    loop: true
    path: /home/hy/wust_data/video/1749800971.avi
    start_frame: 500
    use: false
control:
  alpha_pitch: 0.7
  alpha_yaw: 0.5
  control_rate: 2000
  communication_delay: 1000
  device_name: /dev/ttyACM0
  max_pitch_change: 5
  max_yaw_change: 10
  jump_yaw: 1.0
  use_nav: false
  use_serial: false

tf:
  gimbal2camera_pitch: 0
  gimbal2camera_roll: 0
  gimbal2camera_x: 0.07
  gimbal2camera_y: 0.05
  gimbal2camera_yaw: 0.5
  gimbal2camera_z: 0.0

debug:
  debug_mode: true
  debug_h: 1080
  debug_w: 1440
  debug_show_dt: 0.01
  debug_fps: 60

logger:
  log_level: INFO
  log_path: /home/hy/wust_log
  use_logcli: true
  use_logfile: true
  use_simplelog: true

armor_solver:
  bullet_speed: 21
  compenstator_type: ideal
  controller_delay: 0.01
  gravity: 9.8
  iteration_times: 20
  min_switching_v_yaw: 1
  max_tracking_v_yaw: 180
  prediction_delay: 0.0
  resistance: 0.092
  small_shooting_range_h: 0.12
  small_shooting_range_w: 0.09
  big_shooting_range_h: 0.2
  big_shooting_range_w: 0.15
  side_angle: 20
  oneswitch_position_thres: 0.5
  oneswitch_angle_thres: 30
  oneswitch_hold_time: 1.5
  trajectory_offset:
    - d_max: 4
      d_min: 0
      h_max: 0.4
      h_min: -1
      pitch_off: -1.5
      yaw_off: 0
    - d_max: 7
      d_min: 4
      h_max: 0.4
      h_min: -1
      pitch_off: -1.3
      yaw_off: 0

armor_tracker:
  ekf:
    use_esekf: false
    fusion_esekf_ekf: true
    iteration_num: 2
    oyr_d_front: 0.0002 #1m处
    oyr_d_side: 0.0007 #1m处
    oyr_p: 1 #角度
    oyr_y: 1 #角度
    oyr_yaw_front: 8
    oyr_yaw_side: 5
    oys2qx: 40
    oys2qy: 40
    oys2qyaw: 30
    oys2qz: 5
    yr_d_front: 0.002 #1m处
    yr_d_side: 0.007 #1m处
    yr_p: 10 #角度
    yr_y: 7 #角度
    yr_yaw_front: 8
    yr_yaw_side: 5
    ys2qd_zc: 700
    ys2qr: 70
    ys2qx: 22
    ys2qy: 22
    ys2qyaw: 35
    ys2qz: 1.0
    r_v: 0.05
    q_v: 0.01
    q_a: 0.01
  jump_thresh: 0.4
  lost_time_thres: 0.9
  max_match_distance: 0.5
  max_match_yaw_diff: 0.5
  max_match_z_diff: 0.1
  one_lost_time_thres: 0.1
  tracking_thres: 5
  one_tracking_thres: 1
  v_yaw_to_one_thres_high: 1.0
  v_yaw_to_one_thres_low: 0.5
  track_one_num: 2

rune_solver:
  auto_type_determined: true
  bullet_speet: 20
  compensator_type: resistance
  ekf:
    iteration_num: 1
    q_ypdyaw:
      - 2e-4
      - 1e-4
      - 1e-4
      - 1e-4
    r_ypdyaw:
      - 1
      - 1
      - 0.0005
      - 5
  gravity: 9.8
  lost_time_thres: 0.5
  predict_offset: 0.1
  trajectory_offset:
    - d_max: 6
      d_min: 5
      h_max: 0.4
      h_min: -1
      pitch_off: 0.1
      yaw_off: 0
