<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>崇实战队自瞄系统网页调试器</title>
    <link rel="icon" href="/static/logo.JPG" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
        }
        .video-container, .chart-container {
            margin-top: 20px;
            display: inline-block;
            background-color: #fff;
            padding: 10px;
            border: 3px solid #333;
        }
        input, textarea {
            margin: 5px;
            width: 500px;
            max-width: 90%;
            font-family: monospace;
        }
        textarea {
            resize: vertical;
            white-space: pre-wrap;
            overflow-x: auto;
            font-family: monospace;
            line-height: 1.4;
        }
        fieldset {
            margin: 10px auto;
            border: 1px solid #999;
            padding: 10px;
            text-align: left;
            max-width: 640px;
        }
        label {
            display: inline-block;
            width: 150px;
            text-align: right;
            margin-right: 10px;
            vertical-align: top;
        }
        .json-container {
            margin-top: 20px;
            background-color: #fff;
            border: 3px solid #333;
            padding: 15px;
            display: inline-block;
            vertical-align: top;
            text-align: left;
            width: 600px;
            box-sizing: border-box;
            font-size: 14px;
            height: 450px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow-y: auto;
            transition: opacity 0.2s ease;
        }
        .json-updating { opacity: 0.7; }
        #json-aim { color: #b22222; background-color: #fff5f5; border: 1px solid #f4cccc; padding: 12px; border-radius: 4px; }
        #json-target { color: #2e8b57; background-color: #f5fff5; border: 1px solid #c6ecc6; padding: 12px; border-radius: 4px; }
        #json-row {
            margin-top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .json-tree {
            list-style-type: none;
            padding-left: 10px;
        }
        .json-tree details { margin: 5px 0; }
        .json-tree summary { cursor: pointer; font-weight: bold; outline: none; }
        .json-tree ul { margin-left: 20px; padding-left: 15px; border-left: 1px dashed #ccc; }
        #config-form {
            display: block;
            max-width: 800px;
            margin: 0 auto;
            text-align: left;
        }
        #config-tab fieldset {
            display: block;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 16px;
        }
        #config-tab button {
            display: block;
            margin: 16px auto 0;
            padding: 8px 16px;
            font-size: 16px;
            cursor: pointer;
        }
        .chart-select-controls {
            margin: 10px auto 15px auto;
            width: 640px;
            text-align: left;
        }
    </style>
</head>
<body>

<!-- 顶部 logo 和标题 -->
<div style="display: flex; align-items: center; position: absolute; top: 10px; left: 10px; z-index: 999;">
    <img src="/static/logo.JPG" alt="Logo" style="width: 100px; height: auto; margin-right: 20px;">
    <div style="display: flex; flex-direction: column;">
        <h1>崇实战队自瞄系统网页调试器</h1>
        <p style="margin-top: 5px; font-size: 14px; color: #555;">访问地址：{{ server_url }}</p>
    </div>
</div>

<!-- 切换按钮 -->
<div style="margin-top: 140px;">
    <button onclick="showTab('video')">视频调试</button>
    <button onclick="showTab('config')">参数配置</button>
</div>

<!-- 视频调试页 -->
<div id="video-tab">
    <div class="video-container">
        <img src="{{ url_for('video_feed') }}" width="640" alt="视频流">
    </div>

    <!-- 图表选择和范围设置 -->
    <div class="chart-container">
        <div class="chart-select-controls">
            <label for="chartSelector">选择显示图表：</label>
            <select id="chartSelector" onchange="updateChartType()">
                <option value="yaw">Yaw</option>
                <option value="pitch">Pitch</option>
                <option value="armor_dis">Armor Distance</option>
                <option value="armor_x">Armor x</option>
                <option value="armor_y">Armor y</option>
                <option value="armor_z">Armor z</option>
                <option value="armor_yaw">Armor yaw</option>
                <option value="ypd_p">Ypd p</option>
                <option value="ypd_y">Ypd y</option>
            </select>
        </div>

        <fieldset id="range-settings" style="text-align: left;">
            <legend>范围设置</legend>
            <label for="enableFixedRange">启用固定范围:</label>
            <input type="checkbox" id="enableFixedRange" onchange="updateChartRange()"><br>
            <label for="chartMin">最小值 (min):</label>
            <input type="number" id="chartMin" value="2.0" step="0.1"><br>
            <label for="chartMax">最大值 (max):</label>
            <input type="number" id="chartMax" value="3.0" step="0.1"><br>
            <label for="maxDataPoints">最大显示点数:</label>
            <input type="number" id="maxDataPoints" value="100" min="10" max="1000" step="1"><br>
            <button type="button" onclick="updateChartRange()">更新图表范围</button>
        </fieldset>

        <canvas id="mainChart" width="640" height="300"></canvas>
    </div>

    <!-- Aim/Target JSON 显示 -->
    <div id="json-row">
        <div class="json-container" id="json-aim-container">
            <h3>Aim_info</h3>
            <div id="json-aim"></div>
        </div>
        <div class="json-container" id="json-target-container">
            <h3>Target_info</h3>
            <div id="json-target"></div>
        </div>
    </div>
</div>

<!-- 参数配置页 -->
<div id="config-tab" style="display: none; margin-top: 40px;">
    <form id="config-form"></form>
    <br>
    <button onclick="submitConfig()" type="button">保存参数</button>
</div>

<script>
    let selectedChartType = 'yaw';
    const mainCtx = document.getElementById('mainChart').getContext('2d');

    const mainChart = new Chart(mainCtx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Yaw',
                data: [],
                borderColor: 'red',
                fill: false,
                tension: 0.2
            }]
        },
        options: {
            animation: false,
            responsive: false,
            scales: {
                x: { title: { display: true, text: 'Time (s)' } },
                y: { title: { display: true, text: 'Value' }, min: undefined, max: undefined }
            }
        }
    });

    function updateChartType() {
        selectedChartType = document.getElementById('chartSelector').value;

        const chartMap = {
            yaw:       { label: 'Yaw',            color: 'red' },
            pitch:     { label: 'Pitch',          color: 'blue' },
            armor_dis: { label: 'Armor Distance', color: 'green' },
            armor_x:   { label: 'Armor X',        color: '#FF8C00' },
            armor_y:   { label: 'Armor Y',        color: '#1E90FF' },
            armor_z:   { label: 'Armor Z',        color: '#8A2BE2' },
            armor_yaw: { label: 'Armor Yaw',      color: '#FF1493' },
            ypd_p:     { label: 'Ypd Pitch',      color: '#228B22' },
            ypd_y:     { label: 'Ypd Yaw',        color: '#A52A2A' },
        };

        const info = chartMap[selectedChartType] || { label: selectedChartType, color: 'black' };

        mainChart.data.datasets[0].label = info.label;
        mainChart.data.datasets[0].borderColor = info.color;

        updateChartRange();  // 切换时更新范围设置生效与否
    }

    function updateChartRange() {
        const enableFixed = document.getElementById('enableFixedRange').checked;
        const minVal = parseFloat(document.getElementById('chartMin').value);
        const maxVal = parseFloat(document.getElementById('chartMax').value);
        const maxPointsInput = document.getElementById('maxDataPoints');
        let maxPoints = parseInt(maxPointsInput.value);
        if (isNaN(maxPoints) || maxPoints < 1) maxPoints = 100; // 默认100

        if (enableFixed) {
            if (!isNaN(minVal) && !isNaN(maxVal)) {
                mainChart.options.scales.y.min = minVal;
                mainChart.options.scales.y.max = maxVal;
            } else {
                alert("请输入有效的最小/最大值");
                return;
            }
        } else {
            mainChart.options.scales.y.min = undefined;
            mainChart.options.scales.y.max = undefined;
        }

        // 保存当前最大点数，供 fetch 更新时使用
        mainChart._maxPoints = maxPoints;

        mainChart.update();
    }

    async function fetchDataAndUpdateCharts() {
        try {
            const response = await fetch('/data');
            const json = await response.json();

            if (json.time && json.yaw && json.pitch && json.armor_dis) {
                const maxPoints = mainChart._maxPoints || 100;
                const len = json.time.length;
                const startIdx = len > maxPoints ? len - maxPoints : 0;

                mainChart.data.labels = json.time.slice(startIdx);

                switch (selectedChartType) {
                    case 'yaw':
                        mainChart.data.datasets[0].data = json.yaw.slice(startIdx);
                        break;
                    case 'pitch':
                        mainChart.data.datasets[0].data = json.pitch.slice(startIdx);
                        break;
                    case 'armor_dis':
                        mainChart.data.datasets[0].data = json.armor_dis.slice(startIdx);
                        break;
                    case 'armor_x':
                        mainChart.data.datasets[0].data = json.armor_x.slice(startIdx);
                        break;
                    case 'armor_y':
                        mainChart.data.datasets[0].data = json.armor_y.slice(startIdx);
                        break;
                    case 'armor_z':
                        mainChart.data.datasets[0].data = json.armor_z.slice(startIdx);
                        break;
                    case 'armor_yaw':
                        mainChart.data.datasets[0].data = json.armor_yaw.slice(startIdx);
                        break;
                    case 'ypd_y':
                        mainChart.data.datasets[0].data = json.ypd_y.slice(startIdx);
                        break;
                    case 'ypd_p':
                        mainChart.data.datasets[0].data = json.ypd_p.slice(startIdx);
                        break;
                    default:
                        mainChart.data.datasets[0].data = [];
                }
                mainChart.update('none');
            }
        } catch (e) {
            console.error('Failed to fetch data:', e);
        }
    }

    function showTab(tab) {
        document.getElementById('video-tab').style.display = tab === 'video' ? 'block' : 'none';
        document.getElementById('config-tab').style.display = tab === 'config' ? 'block' : 'none';
        if (tab === 'config') loadConfig();
    }

    let lastAimData = null, lastTargetData = null, configData = {};

    function jsonToHtml(data, container) {
        const title = container.querySelector('h3');
        container.innerHTML = '';
        if (title) container.appendChild(title);
        const contentDiv = document.createElement('div');
        contentDiv.id = container.id + '-content';
        container.appendChild(contentDiv);

        function buildTree(data, parentElement) {
            if (typeof data !== 'object' || data === null) {
                parentElement.textContent = String(data);
                return;
            }
            const ul = document.createElement('ul');
            ul.className = 'json-tree';
            const entries = Array.isArray(data) ? data.map((item, idx) => [idx, item]) : Object.entries(data);
            entries.forEach(([key, value]) => {
                const li = document.createElement('li');
                if (typeof value === 'object' && value !== null) {
                    const details = document.createElement('details');
                    details.open = true;
                    const summary = document.createElement('summary');
                    summary.textContent = key;
                    details.appendChild(summary);
                    const childUl = document.createElement('ul');
                    childUl.className = 'json-tree';
                    buildTree(value, childUl);
                    details.appendChild(childUl);
                    li.appendChild(details);
                } else {
                    li.textContent = `${key}: ${value}`;
                }
                ul.appendChild(li);
            });
            parentElement.appendChild(ul);
        }

        buildTree(data, contentDiv);
    }

    async function fetchAndDisplayJsonWithTree(id, url) {
        const container = document.getElementById(id);
        const containerParent = document.getElementById(id + '-container');
        try {
            containerParent.classList.add('json-updating');
            const res = await fetch(url);
            if (res.ok) {
                const newData = await res.json();
                const lastData = id === 'json-aim' ? lastAimData : lastTargetData;
                if (JSON.stringify(newData) !== JSON.stringify(lastData)) {
                    jsonToHtml(newData, container);
                    if (id === 'json-aim') lastAimData = newData;
                    else lastTargetData = newData;
                }
            }
        } catch (err) {
            console.error(`Error fetching ${url}:`, err);
            container.textContent = `请求错误: ${err.message}`;
        } finally {
            containerParent.classList.remove('json-updating');
        }
    }

    async function loadConfig() {
        try {
            const res = await fetch('/config');
            configData = await res.json();
            renderForm(configData, document.getElementById('config-form'));
        } catch (err) {
            console.error('配置加载失败:', err);
        }
    }

    function renderForm(obj, container, prefix = '') {
        container.innerHTML = '';
        for (let key in obj) {
            const value = obj[key];
            const path = prefix ? `${prefix}.${key}` : key;
            if (typeof value === 'object' && value !== null && !Array.isArray(value)) {
                const fieldset = document.createElement('fieldset');
                const legend = document.createElement('legend');
                legend.innerText = path;
                fieldset.appendChild(legend);
                renderForm(value, fieldset, path);
                container.appendChild(fieldset);
            } else {
                const label = document.createElement('label');
                label.innerText = path;
                const input = document.createElement('input');
                input.value = value;
                input.onchange = () => updateValue(path, parseFloat(input.value));
                container.appendChild(label);
                container.appendChild(input);
                container.appendChild(document.createElement('br'));
            }
        }
    }

    function updateValue(path, val) {
        const keys = path.replace(/\[(\d+)\]/g, '.$1').split('.');
        let obj = configData;
        for (let i = 0; i < keys.length - 1; i++) {
            obj = obj[keys[i]];
        }
        obj[keys[keys.length - 1]] = val;
    }

    async function submitConfig() {
        try {
            const res = await fetch('/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(configData)
            });
            if (res.ok) alert('参数保存成功！');
            else alert('保存失败: ' + res.status);
        } catch (err) {
            alert('保存异常: ' + err);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        fetchAndDisplayJsonWithTree('json-aim', '/aim_log');
        fetchAndDisplayJsonWithTree('json-target', '/target_log');
        updateChartRange(); // 初始化范围和最大点数

        setInterval(() => {
            fetchDataAndUpdateCharts();
            fetchAndDisplayJsonWithTree('json-aim', '/aim_log');
            fetchAndDisplayJsonWithTree('json-target', '/target_log');
        }, 200);
    });
</script>
</body>
</html>
